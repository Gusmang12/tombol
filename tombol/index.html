<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Board Kapal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .table-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .table-title {
            text-align: center;
            color: #2a5298;
            font-size: 1.8em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border: 4px solid #e0e0e0;
        }

        th {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
        }

        .sound-btn {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            font-family: inherit;
        }

        /* Warna berbeda untuk setiap kategori */
        .btn-pembukaan { background: linear-gradient(45deg, #ff6b6b, #ee5a52); }
        .btn-kapal { background: linear-gradient(45deg, #4ecdc4, #44a08d); }
        .btn-tujuan { background: linear-gradient(45deg, #45b7d1, #96c93d); }
        .btn-jam { background: linear-gradient(45deg, #feca57, #ff9ff3); }

        .sound-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        .sound-btn:active {
            transform: scale(0.95);
        }

        .sound-btn::before {
            content: '🔊';
            font-size: 15px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sound-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transform: translate(-50%, -50%);
            transition: all 0.6s ease;
            z-index: 1;
        }

        .sound-btn.playing {
            animation: pulse 0.3s ease;
        }

        .sound-btn.playing::before {
            opacity: 1;
        }

        .sound-btn.playing::after {
            width: 120px;
            height: 120px;
            animation: ripple 0.6s linear;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes ripple {
            to {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }

        .delay-info {
            background: #fff3cd;
            border: 2px solid #ffeaa7;
            border-radius: 10px;
            padding: 10px;
            font-weight: bold;
            color: #2d3436;
        }

        @media (max-width: 768px) {
            .sound-btn {
                width: 60px;
                height: 60px;
                font-size: 12px;
            }
            
            th, td {
                padding: 10px 5px;
            }
        }
        /* ✅ JAM GRID RESPONSIVE - 12 TOMBOL TETAP! */
.jam-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr); /* Desktop: 6 kolom */
    gap: 8px;
    max-width: 100%;
}

.sound-btn {
    width: 65px;
    height: 65px;
    font-size: 12px;
    border-radius: 15px;
}

/* MOBILE: 3 KOLOM + WRAP AUTOMATIC */
@media (max-width: 768px) {
    .jam-grid {
        grid-template-columns: repeat(3, 1fr) !important; /* Mobile: 3 kolom */
        gap: 6px;
    }
    
    .sound-btn {
        width: 58px !important;
        height: 58px !important;
        font-size: 11px !important;
    }
    
    /* Tabel lain tetap scroll horizontal */
    table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
        margin: 0 -10px;
        padding: 0 10px;
    }
}

/* TABLET: 4 KOLOM */
@media (min-width: 769px) and (max-width: 1024px) {
    .jam-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}
    </style>
</head>
<body>

        <!-- Tabel 4: Jam Keberangkatan (12 tombol) -->

</div>
    </div>

    <script>
        // Daftar suara (ganti dengan file audio Anda atau gunakan text-to-speech)
        const sounds = {
            pembukaan1: "Selamat datang di pelabuhan Sanur",
            opening1: "Welcome to Sanur Port",
            pembukaan2: "Mohon perhatian penumpang Untuk Segera menuju dermaga dengan keberangkatan kapal",
            opening2: "Attention passengers, please proceed to the pier for boat departure",
            pembukaan3: "Mohon Maaf ada keterlambatan Keberangkatan untuk kapal",
            opening3: "We apologize for the delay in departure for boat",
            kapal1: "THE tanis lembongan express",
            kapal2: "THE tanis lembongan express 2",
            kapal3: "gili nusa 1",
            kapal4: "modern dream 58",
            kapal5: "benz fast boat",
            kapal6: "grand tanis lembongan express",
            kapal7: "sunrise fast boat",
            kapal8: "tanis rangger fast cruise",
            kapal9: "lucky monkey fast boat",
            kapal10: "glory prime fast boat",
             kapal11: "maruti duta 2",
            kapal12: "white monkey fast boat",
            kapal13: "glory 2 fast boat",
            kapal14: "ray fish fast boat",
            kapal15: "agung jaya fast boat",
            tujuan1: "Tujuan Nusa Penida",
            detination1: "Destination Nusa Penida",
            tujuan2: "Tujuan Nusa Lembongan",
            destination2: "Destination Nusa Lembongan",
            jam01: "Pukul 07:00",
            time01: "seven o'clock",
            jam02: "Pukul 08:00",
            time02: "eight o'clock",
            jam03: "Pukul 09:00",
            time03: "nine o'clock",
            jam04: "Pukul 10:00",
            time04: "ten o'clock",
            jam05: "Pukul 11:00",
            time05: "eleven o'clock",
            jam06: "Pukul 12:00",
            time06: "twelve o'clock",
            jam07: "Pukul 13:00",
            time07: "thirteen o'clock",
            jam08: "Pukul 14:00",
            time08: "fourteen o'clock",
            jam09: "Pukul 15:00",
            time09: "nineteen o'clock",
            jam10: "Pukul 16:00",
            time10: "sixteen o'clock",
            jam11: "Pukul 17:00",
            time11: "seventeen o'clock",
            jam12: "Pukul 18:00",
            time12: "eighteen o'clock",
        };

        // Event listener untuk semua tombol
        document.querySelectorAll('.sound-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const soundKey = this.getAttribute('data-sound');
                playSound(soundKey, this);
            });
        });

        function playSound(soundKey, button) {
            // Efek visual
            button.classList.add('playing');
            setTimeout(() => {
                button.classList.remove('playing');
            }, 600);

            // Mainkan suara menggunakan Web Speech API (text-to-speech)
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(sounds[soundKey]);
                utterance.lang = 'id-ID'; // Bahasa Indonesia
                utterance.rate = 0.9;
                utterance.pitch = 1;
                utterance.volume = 1;
                
                speechSynthesis.speak(utterance);
            } else {
                // Fallback: alert text
                alert(`Suara: ${sounds[soundKey]}`);
            }
        }
    </script>
</body>
</html>
